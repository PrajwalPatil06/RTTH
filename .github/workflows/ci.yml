name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

  # Unit tests
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        package:
          - ./internal/structs/...
          - ./internal/store/...
          - ./internal/persist/...
          - ./internal/blockchain/...
          - ./internal/domain/...
          - ./internal/handlers/...

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests (race detector)
        run: |
          go test -race -count=1 -timeout=120s \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ${{ matrix.package }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ strategy.job-index }}
          path: coverage.out
          retention-days: 3

  #Integration tests
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run integration tests (race detector)
        run: |
          go test -race -count=1 -timeout=120s -v \
            ./test/integration/...

  #Coverage gate
  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate full coverage report
        run: |
          go test -race -count=1 -timeout=120s \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./internal/...
          go tool cover -func=coverage.out | tee coverage_summary.txt

      - name: Enforce minimum coverage (70 %)
        run: |
          TOTAL=$(go tool cover -func=coverage.out \
            | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          awk -v t="$TOTAL" 'BEGIN { if (t+0 < 70) { print "Coverage " t "% < 70% threshold"; exit 1 } }'

      - name: Upload HTML coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage.html
          retention-days: 7

  #Build check
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build server
        run: go build -o /dev/null ./...

      - name: Build channel proxy
        run: go build -o /dev/null ./cmd/channel/...

      - name: Build client CLI
        run: go build -o /dev/null ./cmd/client/...